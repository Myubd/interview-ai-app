name: Build Windows Installer
on:
  push:
    tags:
      - "v*"
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.21.0

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller launch.spec

      - name: Install Inno Setup
        run: choco install innosetup --version=7.0.1 -y

      - name: Build Installer (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 7\ISCC.exe" InterviewApp.iss

      - name: Create GitHub Release & Upload Installer
        uses: softprops/action-gh-release@v2
        with:
          files: output/InterviewAppSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
