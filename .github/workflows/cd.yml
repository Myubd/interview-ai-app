name: CD - Build & Release
on:
  push:
    tags:
      - "v*"
jobs:
  # ============================================================
  # Streamlit版 ビルド
  # ============================================================
  build-streamlit:
    name: Build Streamlit Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: streamlit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.21.0
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: streamlit
        run: |
          pytest tests/ -v --tb=short -m "not integration" --cov=utils --cov=rag --cov-report=term-missing

      - name: Get version info
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          $hash = git rev-parse --short HEAD
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "FULL_VERSION=$ver+$hash" >> $env:GITHUB_OUTPUT

      - name: Write version file
        working-directory: streamlit
        run: |
          echo "${{ steps.version.outputs.FULL_VERSION }}" > version.txt

      - name: Build EXE
        working-directory: streamlit
        run: pyinstaller launch.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Debug dist contents
        working-directory: streamlit
        run: |
          Write-Host "=== dist/ contents ==="
          if (Test-Path "dist") { Get-ChildItem -Recurse dist | Select-Object FullName } else { Write-Host "dist/ NOT FOUND" }
          Write-Host "=== app.ico ==="
          Test-Path "app.ico"
          Write-Host "=== InterviewAppSetup.iss ==="
          Get-Content "InterviewAppSetup.iss"

      - name: Build Installer
        working-directory: streamlit
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files (x86)\Inno Setup 7\ISCC.exe" }
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 7\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "Inno Setup not found" }
          & $iscc InterviewAppSetup.iss /DAPP_VERSION=${{ steps.version.outputs.VERSION }}

      - name: Upload Streamlit installer
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-installer
          path: streamlit/output/InterviewAppSetup.exe


  # ============================================================
  # FastAPI版 ビルド
  # ============================================================
  build-fastapi:
    name: Build FastAPI Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Get version info
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          $hash = git rev-parse --short HEAD
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "FULL_VERSION=$ver+$hash" >> $env:GITHUB_OUTPUT

      - name: Build React frontend
        working-directory: react-fastapi/frontend
        run: |
          npm install
          npm run build

      - name: Install Python dependencies
        working-directory: react-fastapi/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.21.0

      - name: Write version file
        working-directory: react-fastapi/backend
        run: |
          echo "${{ steps.version.outputs.FULL_VERSION }}" > version.txt

      - name: Build EXE
        working-directory: react-fastapi/backend
        run: pyinstaller launch_fastapi.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        working-directory: react-fastapi/backend
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files (x86)\Inno Setup 7\ISCC.exe" }
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 7\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "Inno Setup not found" }
          & $iscc InterviewAppSetupFastAPI.iss /DAPP_VERSION=${{ steps.version.outputs.VERSION }}

      - name: Upload FastAPI installer
        uses: actions/upload-artifact@v4
        with:
          name: fastapi-installer
          path: react-fastapi/backend/output/InterviewAppSetupFastAPI.exe

  # ============================================================
  # GitHub Release（両方のビルドが完了してから）
  # ============================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-streamlit, build-fastapi]
    steps:
      - uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Download Streamlit installer
        uses: actions/download-artifact@v4
        with:
          name: streamlit-installer
          path: dist/

      - name: Download FastAPI installer
        uses: actions/download-artifact@v4
        with:
          name: fastapi-installer
          path: dist/

      - name: Generate Changelog
        run: |
          echo "Release ${{ steps.version.outputs.TAG }}" > changelog.txt
          git log -1 --pretty=%B >> changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          body_path: changelog.txt
          files: |
            dist/InterviewAppSetup.exe
            dist/InterviewAppSetupFastAPI.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
