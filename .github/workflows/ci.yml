name: CI - Test & Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  # ─────────────────────────────────────────
  # Job 1: ユニットテスト（高速・Linux）
  # ─────────────────────────────────────────
  unit-test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -m "not integration" \
            --cov=utils --cov=rag \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ─────────────────────────────────────────
  # Job 2: PyInstaller ビルド確認（Windows）
  #         テスト通過後にのみ実行する
  # ─────────────────────────────────────────
  build-check:
    name: PyInstaller Build Check (Windows)
    runs-on: windows-latest
    needs: unit-test   # ← テストが通った場合のみビルド

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.21.0

      - name: Test PyInstaller build (dry run)
        run: |
          pyinstaller launch.spec --noconfirm

      - name: Check dist output
        run: |
          dir dist
