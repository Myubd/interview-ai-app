[server]
# アップロード可能な最大ファイルサイズ（MB）。
# 履歴書・企業情報のPDF/画像は通常 10MB 以内に収まるため余裕を持って 20MB に設定。
# 巨大ファイルはメモリ不足の原因になるため、これ以上大きくしないことを推奨。
maxUploadSize = 20

[browser]
# ブラウザが自動でクラッシュレポートを収集するのを防ぐ（ローカル専用アプリのため不要）
gatherUsageStats = false

[theme]
# ライト・ダーク両対応（OS設定に追従）させる場合はここをコメントアウトしてください。
# 明示的に設定したい場合は以下のいずれかを有効にしてください。
# base = "light"
# base = "dark"
