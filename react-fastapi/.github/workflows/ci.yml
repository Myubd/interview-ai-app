name: CI - Test & Build Check
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  # ============================================================
  # Streamlit版 ユニットテスト
  # ============================================================
  streamlit-unit-test:
    name: Streamlit Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: streamlit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        working-directory: streamlit
        run: |
          pytest tests/ -m "not integration" \
            --cov=utils \
            --cov=rag \
            --cov=session_io \
            --cov=startup \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-coverage-report
          path: streamlit/coverage.xml

  # ============================================================
  # FastAPI版 ユニット・APIテスト
  # ============================================================
  fastapi-unit-test:
    name: FastAPI Unit & API Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: react-fastapi/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run unit and API tests with coverage
        working-directory: react-fastapi/backend
        run: |
          pytest tests/ -m "not integration" \
            --cov=api \
            --cov=llm \
            --cov=services \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: fastapi-coverage-report
          path: react-fastapi/backend/coverage.xml

  # ============================================================
  # PyInstaller ビルド確認（Windows）
  # streamlit-unit-test と fastapi-unit-test 両方通過後に実行
  # ============================================================
  build-check:
    name: PyInstaller Build Check (Windows)
    runs-on: windows-latest
    needs: [streamlit-unit-test, fastapi-unit-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: streamlit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.21.0

      - name: Test PyInstaller build (dry run)
        working-directory: streamlit
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE\streamlit
          pyinstaller launch.spec --noconfirm

      - name: Check dist output
        working-directory: streamlit
        run: |
          dir dist
