name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # バックエンド — ユニット・インテグレーション・APIテスト
  # ============================================================
  test-backend:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend
        run: pytest -m unit --tb=short -q

      - name: Run integration tests
        working-directory: backend
        run: pytest -m integration --tb=short -q

      - name: Run API tests
        working-directory: backend
        run: pytest -m api --tb=short -q

      - name: Run all tests with coverage
        working-directory: backend
        run: |
          pip install pytest-cov
          pytest --cov=. --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ============================================================
  # フロントエンド — TypeScript ビルドチェック
  # ============================================================
  build-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: TypeScript check & build
        working-directory: frontend
        run: npm run build

  # ============================================================
  # Docker Compose — イメージビルド確認
  # ============================================================
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    # テストが通ったあとにのみ実行
    needs: [test-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build --no-cache

      - name: Verify backend image starts
        run: |
          docker compose up -d ollama backend
          sleep 10
          docker compose logs backend
          docker compose down

  # ============================================================
  # コード品質チェック（オプション）
  # ============================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install ruff

      - name: ruff check (lint)
        working-directory: backend
        run: ruff check . --select=E,F,W --ignore=E501,F401
        continue-on-error: true   # 最初は警告のみ

      - name: ruff format check
        working-directory: backend
        run: ruff format . --check
        continue-on-error: true
