[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# カスタムマーカー定義
markers =
    unit: 外部依存なし（純粋関数テスト）
    integration: DB を使うテスト
    api: FastAPI TestClient を使うエンドポイントテスト

# デフォルトオプション
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
